const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

let playing=false;

btn.onclick=function(){

    if(!playing){

    }else{
        music.pause();
        btn.innerHTML="🎵 Music OFF";
        playing=false;
    }

}
